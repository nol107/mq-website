<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maison QUasar</title>
  <link rel="icon" type="image/png" href="Logos/MAISON%20QUASAR%20Q%20LOGO%2001.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      width: 100%;
    }

    .hero__logo {
      width: min(560px, 88vw);
      height: auto;
    }

    .hero__cta {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: transparent;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      background: #fff;
      color: #000;
      border-color: #fff;
      outline: none;
    }

    .btn svg {
      flex-shrink: 0;
    }

    /* ── Mention ── */
    .mention {
      margin-top: 52px;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
    }

    /* ── Q logo fixé en bas à droite ── */
    .q-logo {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 48px;
      height: auto;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <img
      class="hero__logo"
      src="Logos/MAISON_QUASAR_TXT_WHITE_LOGO.png"
      alt="Maison QUasar"
    />

    <div class="hero__cta">
      <!-- Instagram -->
      <a
        class="btn"
        href="https://www.instagram.com/maisonquasar"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Suivez-nous sur Instagram"
      >
        <!-- Instagram SVG icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
        </svg>
        Instagram
      </a>

      <!-- Réservation -->
      <a
        class="btn"
        href="https://3s-studios.setmore.com/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Réserve ta session
      </a>
    </div>

    <p class="mention">Site bientôt disponible ..</p>
  </section>

  <!-- Q logo fixé en bas à droite -->
  <img
    class="q-logo"
    src="Logos/MAISON%20QUASAR%20Q%20LOGO%2001.png"
    alt=""
    aria-hidden="true"
  />

</body>
</html>
